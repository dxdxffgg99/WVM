name: WVM Test & Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake clang-tools

      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Run all examples
        run: |
          echo "==== Running Examples ===="
          for example in ./examples/*.asm; do
            echo "Running: $example"
            ./build/wvm "$example" || exit 1
            echo "✓ $example passed"
          done
          echo "All examples completed successfully!"

      - name: Performance benchmark
        run: |
          echo "==== Performance Benchmark (3 runs) ===="
          for i in {1..3}; do
            echo "Run $i:"
            ./build/wvm ./examples/benchmark.asm
          done

      - name: Static analysis (clang-tidy)
        run: |
          echo "==== Static Analysis ===="
          cmake -B build-analyze -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build-analyze -j
          
          find src -name '*.c' -o -name '*.h' | while read f; do
            echo "Analyzing: $f"
            clang-tidy "$f" -p build-analyze || true
          done

