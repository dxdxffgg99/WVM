name: VM Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake

      - name: Build (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Warmup
        run: |
          ./build/wvm > /dev/null || true

      - name: Benchmark (3 runs)
        run: |
          echo "==== VM Benchmark ===="
          for i in {1..3}; do
            ./build/wvm ../examples/benchmark.asm
          done
          
      - name: clang-tidy
        run: |
          echo "==== clang-tidy ===="
          cmake -B build-tidy -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build-tidy -j
          
          find src -name '*.c' | while read f; do
            clang-tidy "$f" -p build-tidy || true
          done
          
      - name: build with warnings
        run: |
          echo "==== compiler warnings ===="
          cmake -B build-warn -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"
          cmake --build build-warn -j || true

      - name: ASan run
        run: |
          cmake -B build-asan -DCMAKE_C_FLAGS="-fsanitize=address -O1" \
                              -DCMAKE_CXX_FLAGS="-fsanitize=address -O1"
          cmake --build build-asan -j
          ./build-asan/wvm || true
